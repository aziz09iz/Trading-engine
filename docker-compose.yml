services:
  api:
    build: .
    command: uvicorn trading_system.app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8501:80"
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_password
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./trading_system/storage/migrations:/docker-entrypoint-initdb.d

volumes:
  redis-data:
  pg-data:
